name: Bug Report
description: Report a bug, crash, or unexpected behaviour.
title: "[Bug]: "
labels:
  - bug

body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project is affected?
      options:
        - Bundle Expansion
        - Mob Death Count
        - Homestead Farming
        - GoGoSnow
        - Other
    validations:
      required: true

  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft Version
      description: The Minecraft version you are using.
      placeholder: "1.21.10"
    validations:
      required: true

  - type: input
    id: neoforge_version
    attributes:
      label: NeoForge Version
      description: The NeoForge version you are using.
      placeholder: "21.10.x"
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: Mod Version
      description: The version of the mod experiencing the issue.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      options:
        - Crash
        - Gameplay Bug
        - Visual Bug
        - Performance Issue
        - Compatibility Issue
        - Data Loss
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue in as much detail as possible.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected_behaviour
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps To Reproduce
      description: Explain how to reproduce the issue.
      placeholder: |
        1. Install the mod
        2. Create or load a world
        3. Perform an action
        4. Observe the issue
    validations:
      required: true

  - type: textarea
    id: other_mods
    attributes:
      label: Other Installed Mods
      description: List any other mods that may be relevant.

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Reports
      description: |
        Paste logs here or upload a file.
        For large logs, upload your latest.log to mclo.gs and paste the link.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: Optional screenshots, videos, or additional information.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I am using the latest available version of the mod.
          required: true
        - label: I have checked for existing issues before creating this report.
          required: true
